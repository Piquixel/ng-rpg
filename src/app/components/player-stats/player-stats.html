<hgroup>
  <div>
    <h1>{{ iconByClass[player().type] }}</h1>
    <div>
      <h3>{{ player().nickname }}</h3>
      <span>{{ player().type | titlecase }} - Niveau {{ player().lvl }}</span>
    </div>
  </div>
  <span>💰{{ player().money }}</span>
</hgroup>
<div class="stats">
  <label for="hp-stats">
    <span>HP</span>
    <span>{{ player().currentHP }}/{{ player().characteristics.hp }}</span>
  </label>
  <progress
    id="hp-stats"
    [max]="player().characteristics.hp"
    [value]="player().currentHP"></progress>
  <label for="mp-stats">
    <span>MP</span>
    <span>{{ player().currentMP }}/{{ player().characteristics.mana }}</span>
  </label>
  <progress
    id="mp-stats"
    [max]="player().characteristics.mana"
    [value]="player().currentMP"></progress>
  <label for="exp-stats">
    <span>EXP</span>
    <span>{{ player().currentXP }}/{{ player().lvl * 100 }}</span>
  </label>
  <progress id="exp-stats" [max]="player().lvl * 100" [value]="player().currentXP"></progress>
</div>
