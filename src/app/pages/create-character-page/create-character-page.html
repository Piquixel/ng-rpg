<h2 class="title-2">⚔️ Character Creation</h2>
<div class="fieldContainer">
  <label for="chara-input" class="fieldContainer__label">Character's name</label>
  <input
    [formControl]="charName"
    type="text"
    placeholder="Pick a name for your hero…"
    id="chara-input"
    class="fieldContainer__field" />
</div>
<h3 class="title-3 title-3--label">Pick a Guild</h3>
<div class="cardsContainer">
  @for (item of data; track item.description) {
    <app-character-card
      [isSelected]="selectedGuild === item"
      [guild]="item"
      (pick)="pickGuild(item)" />
  }
</div>
<button
  [disabled]="charName.invalid || !selectedGuild"
  class="interactBtn interactBtn--primary"
  routerLink="/game/map">
  🚀 Begin Adventure!
</button>
